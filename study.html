<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Progress Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="p-5 mb-4 bg-primary text-white rounded">
        <h1>Study Progress Dashboard</h1>
        <p>Track your learning progress, completed lessons and current modules.</p>
    </div>

    <!-- Subject Buttons -->
    <h3>Subjects</h3>

    <button class="btn btn-primary">Biology</button>
    <button class="btn btn-success">Physics</button>
    <button class="btn btn-warning">English</button>
    <button class="btn btn-danger">Chemistry</button>

    <hr>

    <!-- Badges -->
    <h3>Completed Lessons</h3>

    <p>Biology <span class="badge bg-primary">12</span></p>
    <p>Physics <span class="badge bg-success">8</span></p>
    <p>English <span class="badge bg-warning">10</span></p>
    <p>Chemistry <span class="badge bg-danger">6</span></p>

    <hr>

    <!-- Progress Bars -->
    <h3>Learning Progress</h3>

    <p>Biology</p>
    <div class="progress mb-3">
        <div class="progress-bar" style="width: 85.5%">85.5%</div>
    </div>

    <p>Physics</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-success" style="width: 70%">70%</div>
    </div>

    <p>English</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-warning" style="width: 75%">75%</div>
    </div>

    <p>Chemistry</p>
    <div class="progress mb-3">
        <div class="progress-bar bg-danger" style="width: 82%">82%</div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
